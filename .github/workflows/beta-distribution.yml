name: beta-distribution

on:
  push:
    branches:
      - beta

permissions:
  contents: read

concurrency:
  group: beta-distribution-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.41.6
  IOS_BUNDLE_ID: com.jungwuk.opencodeclient

jobs:
  ios:
    name: iOS to App Store Connect
    runs-on: macos-15
    environment: beta
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Read Flutter version
        id: version
        run: |
          version="$(awk '/^version:/{print $2}' pubspec.yaml)"
          echo "build_name=${version%%+*}" >> "$GITHUB_OUTPUT"
          echo "build_number=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))" >> "$GITHUB_OUTPUT"

      - name: Validate iOS distribution secrets
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in \
            IOS_DISTRIBUTION_CERTIFICATE_BASE64 \
            IOS_DISTRIBUTION_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_PRIVATE_KEY \
            APPLE_TEAM_ID
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required iOS distribution secrets:\n'
            printf ' - %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Import iOS distribution certificate
        uses: Apple-Actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}

      - name: Install iOS provisioning profile
        id: provisioning-profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          profile_path="$RUNNER_TEMP/ios_distribution.mobileprovision"
          profile_plist="$RUNNER_TEMP/ios_distribution.plist"
          profiles_dir="$HOME/Library/MobileDevice/Provisioning Profiles"

          mkdir -p "$profiles_dir"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$profile_path"
          security cms -D -i "$profile_path" > "$profile_plist"

          profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$profile_plist")"
          profile_name="$(/usr/libexec/PlistBuddy -c 'Print Name' "$profile_plist")"
          cp "$profile_path" "$profiles_dir/$profile_uuid.mobileprovision"

          echo "profile_name=$profile_name" >> "$GITHUB_OUTPUT"

      - name: Configure iOS Runner signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.provisioning-profile.outputs.profile_name }}
        run: |
          ruby <<'RUBY'
          path = 'ios/Runner.xcodeproj/project.pbxproj'
          apple_team_id = ENV.fetch('APPLE_TEAM_ID')
          profile_name = ENV.fetch('PROFILE_NAME')
          text = File.read(path)

          def quote(value)
            %("#{value.gsub('\\', '\\\\\\').gsub('"', '\\"')}")
          end

          settings = {
            'CODE_SIGN_IDENTITY' => quote('Apple Distribution'),
            'CODE_SIGN_STYLE' => 'Manual',
            'DEVELOPMENT_TEAM' => apple_team_id,
            'PROVISIONING_PROFILE_SPECIFIER' => quote(profile_name),
          }

          text.gsub!(/buildSettings = \{\n.*?\n\t\t\t\};/m) do |block|
            next block unless block.include?(
              'PRODUCT_BUNDLE_IDENTIFIER = com.jungwuk.opencodeclient;'
            )

            settings.reduce(block) do |updated, (key, value)|
              line = "\t\t\t\t#{key} = #{value};\n"
              pattern = /^(\t\t\t\t)#{Regexp.escape(key)} = .*?;\n/
              if updated.match?(pattern)
                updated.sub(pattern, line)
              else
                updated.sub("buildSettings = {\n", "buildSettings = {\n#{line}")
              end
            end
          end

          File.write(path, text)
          RUBY

      - name: Create iOS export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ steps.provisioning-profile.outputs.profile_name }}
        run: |
          export_options="$RUNNER_TEMP/ExportOptions.plist"
          rm -f "$export_options"

          /usr/libexec/PlistBuddy -c 'Clear dict' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :method string app-store-connect' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :signingStyle string manual' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :signingCertificate string Apple Distribution' "$export_options"
          /usr/libexec/PlistBuddy -c "Add :teamID string $APPLE_TEAM_ID" "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :manageAppVersionAndBuildNumber bool false' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :stripSwiftSymbols bool true' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :uploadSymbols bool true' "$export_options"
          /usr/libexec/PlistBuddy -c 'Add :provisioningProfiles dict' "$export_options"
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:$IOS_BUNDLE_ID string $PROFILE_NAME" "$export_options"

          echo "IOS_EXPORT_OPTIONS_PLIST=$export_options" >> "$GITHUB_ENV"

      - name: Pub get
        run: flutter pub get

      - name: Build signed iOS IPA
        run: |
          flutter build ipa \
            --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}" \
            --export-options-plist "$IOS_EXPORT_OPTIONS_PLIST"

      - name: Resolve IPA path
        id: ipa
        run: |
          ipa_path="$(find build/ios/ipa -maxdepth 1 -name '*.ipa' -type f | head -n 1)"
          if [ -z "$ipa_path" ]; then
            echo "No iOS IPA found."
            exit 1
          fi

          echo "path=$ipa_path" >> "$GITHUB_OUTPUT"

      - name: Upload IPA to App Store Connect
        uses: Apple-Actions/upload-testflight-build@1fb41afa66075b5d62c79cb623c6c4999334e185
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          app-type: ios
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

  macos:
    name: macOS GitHub Release asset
    runs-on: macos-15
    outputs:
      raw_version: ${{ steps.version.outputs.raw_version }}
      safe_version: ${{ steps.version.outputs.safe_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Read Flutter version
        id: version
        run: |
          version="$(awk '/^version:/{print $2}' pubspec.yaml)"
          {
            echo "raw_version=$version"
            echo "safe_version=${version/+/-build.}"
            echo "build_name=${version%%+*}"
            echo "build_number=$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))"
          } >> "$GITHUB_OUTPUT"

      - name: Pub get
        run: flutter pub get

      - name: Build macOS app
        run: |
          flutter build macos \
            --release \
            --build-name "${{ steps.version.outputs.build_name }}" \
            --build-number "${{ steps.version.outputs.build_number }}"

      - name: Package macOS app
        run: |
          mkdir -p artifacts
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found."
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "$app_path" \
            "artifacts/boc-macos-v${{ steps.version.outputs.safe_version }}-${{ steps.version.outputs.build_number }}.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-release-asset
          path: artifacts/*.zip
          if-no-files-found: error

  windows:
    name: Windows GitHub Release asset
    runs-on: windows-2022
    outputs:
      raw_version: ${{ steps.version.outputs.raw_version }}
      safe_version: ${{ steps.version.outputs.safe_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Read Flutter version
        id: version
        shell: pwsh
        run: |
          $version = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)').Matches[0].Groups[1].Value
          $safeVersion = $version -replace '\+', '-build.'
          $buildName = $version.Split('+')[0]
          $buildNumber = ([int]$env:GITHUB_RUN_NUMBER * 100) + [int]$env:GITHUB_RUN_ATTEMPT

          "raw_version=$version" >> $env:GITHUB_OUTPUT
          "safe_version=$safeVersion" >> $env:GITHUB_OUTPUT
          "build_name=$buildName" >> $env:GITHUB_OUTPUT
          "build_number=$buildNumber" >> $env:GITHUB_OUTPUT

      - name: Pub get
        run: flutter pub get

      - name: Build Windows app
        run: |
          flutter build windows `
            --release `
            --build-name "${{ steps.version.outputs.build_name }}" `
            --build-number "${{ steps.version.outputs.build_number }}"

      - name: Package Windows app
        shell: pwsh
        run: |
          $releasePath = "build\windows\x64\runner\Release"
          if (-not (Test-Path $releasePath)) {
            Write-Error "No Windows release build found at $releasePath."
          }

          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive `
            -Path "$releasePath\*" `
            -DestinationPath "artifacts\boc-windows-v${{ steps.version.outputs.safe_version }}-${{ steps.version.outputs.build_number }}.zip" `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-release-asset
          path: artifacts/*.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub beta release
    runs-on: ubuntu-24.04
    environment: beta
    permissions:
      contents: write
    needs:
      - ios
      - macos
      - windows
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: macos-release-asset
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: windows-release-asset
          path: dist

      - name: Generate desktop checksums
        run: |
          cd dist
          sha256sum ./*.zip > SHA256SUMS.txt

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RAW_VERSION: ${{ needs.macos.outputs.raw_version }}
          SAFE_VERSION: ${{ needs.macos.outputs.safe_version }}
        run: |
          beta_build_number="$((GITHUB_RUN_NUMBER * 100 + GITHUB_RUN_ATTEMPT))"
          tag_name="beta-v$SAFE_VERSION-$beta_build_number"
          short_sha="${GITHUB_SHA::7}"

          gh release create "$tag_name" dist/* \
            --target "$GITHUB_SHA" \
            --title "Beta $RAW_VERSION ($short_sha)" \
            --notes "Automated beta desktop build from $GITHUB_SHA." \
            --prerelease
