name: opencode_mobile_remote
description: "Spec-driven adaptive OpenCode Flutter client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  collection: ^1.19.1
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  google_fonts: ^6.3.2
  http: ^1.5.0
  intl: ^0.20.2
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.10.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.11.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fixtures/probes/
    - assets/fixtures/config/
    - assets/fixtures/events/
