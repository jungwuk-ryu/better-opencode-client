<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f2f7f4"/>
  <rect x="60" y="60" width="1480" height="780" rx="36" fill="#fbfffc" stroke="#b8d3c3" stroke-width="4"/>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#102a43">Phase 2 Storyboard: Mobile Git Loop</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="20" fill="#52606d">Repository summary, staging, commit, sync, branches, and PR check visibility.</text>

  <rect x="110" y="230" width="300" height="470" rx="26" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Repo Snapshot</text>
  <text x="140" y="330" font-family="Arial, sans-serif" font-size="21" fill="#334e68">branch: feature/mobile</text>
  <text x="140" y="368" font-family="Arial, sans-serif" font-size="21" fill="#334e68">ahead: 2   behind: 1</text>
  <text x="140" y="406" font-family="Arial, sans-serif" font-size="21" fill="#334e68">changed: 4</text>
  <text x="140" y="444" font-family="Arial, sans-serif" font-size="21" fill="#334e68">conflicts: 1</text>

  <rect x="460" y="230" width="300" height="470" rx="26" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="490" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Stage and Commit</text>
  <text x="490" y="330" font-family="Arial, sans-serif" font-size="21" fill="#334e68">Select files, stage all,</text>
  <text x="490" y="368" font-family="Arial, sans-serif" font-size="21" fill="#334e68">compose title and body,</text>
  <text x="490" y="406" font-family="Arial, sans-serif" font-size="21" fill="#334e68">then refresh status.</text>
  <rect x="490" y="470" width="210" height="54" rx="16" fill="#0b6e4f"/>
  <text x="548" y="505" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#fff">Commit</text>

  <rect x="810" y="230" width="300" height="470" rx="26" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="840" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2933">Sync and Branches</text>
  <text x="840" y="330" font-family="Arial, sans-serif" font-size="21" fill="#334e68">Pull, push, switch branch,</text>
  <text x="840" y="368" font-family="Arial, sans-serif" font-size="21" fill="#334e68">or create a new one from</text>
  <text x="840" y="406" font-family="Arial, sans-serif" font-size="21" fill="#334e68">the same sheet.</text>

  <rect x="1160" y="230" width="300" height="470" rx="26" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="1190" y="285" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2933">PR and Fallback</text>
  <text x="1190" y="330" font-family="Arial, sans-serif" font-size="21" fill="#334e68">Read-only PR status and</text>
  <text x="1190" y="368" font-family="Arial, sans-serif" font-size="21" fill="#334e68">checks stay visible, while</text>
  <text x="1190" y="406" font-family="Arial, sans-serif" font-size="21" fill="#334e68">terminal fallback remains one tap away.</text>
</svg>
