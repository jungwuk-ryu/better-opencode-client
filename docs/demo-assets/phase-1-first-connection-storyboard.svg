<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f5f0e8"/>
  <rect x="60" y="60" width="1480" height="780" rx="36" fill="#fffaf2" stroke="#d6c7ab" stroke-width="4"/>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#1f2933">Phase 1 Storyboard: First Connection</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="20" fill="#52606d">Deep link import, trust review, probe feedback, and saved profile entry.</text>

  <rect x="100" y="230" width="420" height="500" rx="28" fill="#fdf6ea" stroke="#d8c4a7" stroke-width="3"/>
  <text x="130" y="280" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#102a43">1. Shared Link</text>
  <text x="130" y="325" font-family="Arial, sans-serif" font-size="22" fill="#334e68">Open an opencode-remote link</text>
  <text x="130" y="360" font-family="Arial, sans-serif" font-size="22" fill="#334e68">directly or scan a QR that</text>
  <text x="130" y="395" font-family="Arial, sans-serif" font-size="22" fill="#334e68">contains the same payload.</text>
  <rect x="130" y="455" width="280" height="150" rx="22" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="155" y="515" font-family="Courier New, monospace" font-size="20" fill="#486581">opencode-remote://</text>
  <text x="155" y="550" font-family="Courier New, monospace" font-size="20" fill="#486581">home?import=...</text>

  <rect x="590" y="230" width="420" height="500" rx="28" fill="#eef8f1" stroke="#a7d2b5" stroke-width="3"/>
  <text x="620" y="280" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#102a43">2. Import Review</text>
  <text x="620" y="325" font-family="Arial, sans-serif" font-size="22" fill="#334e68">Validate version, URL, auth,</text>
  <text x="620" y="360" font-family="Arial, sans-serif" font-size="22" fill="#334e68">expiry, and duplicate profile</text>
  <text x="620" y="395" font-family="Arial, sans-serif" font-size="22" fill="#334e68">before saving the profile.</text>
  <rect x="620" y="455" width="300" height="54" rx="16" fill="#1f7a46"/>
  <text x="652" y="491" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#fff">Save Shared Profile</text>

  <rect x="1080" y="230" width="420" height="500" rx="28" fill="#eef4ff" stroke="#9fbbe9" stroke-width="3"/>
  <text x="1110" y="280" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#102a43">3. Trust View</text>
  <text x="1110" y="325" font-family="Arial, sans-serif" font-size="22" fill="#334e68">See server identity, version,</text>
  <text x="1110" y="360" font-family="Arial, sans-serif" font-size="22" fill="#334e68">capabilities, endpoint health,</text>
  <text x="1110" y="395" font-family="Arial, sans-serif" font-size="22" fill="#334e68">and auth classification.</text>
  <rect x="1110" y="455" width="310" height="170" rx="22" fill="#fff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="1140" y="515" font-family="Arial, sans-serif" font-size="22" fill="#1f2933">Server: ready</text>
  <text x="1140" y="555" font-family="Arial, sans-serif" font-size="22" fill="#1f2933">TLS/Auth: verified</text>
  <text x="1140" y="595" font-family="Arial, sans-serif" font-size="22" fill="#1f2933">Capabilities: 9 enabled</text>
</svg>
